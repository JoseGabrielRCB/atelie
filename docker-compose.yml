# Stack completa do Ateliê: banco + backend (Django) + frontend (Vite).
# Subir tudo com:  docker compose up        (use -d para rodar em segundo plano)
# Parar:           docker compose down      (-v também apaga o banco)
#
# Acessos:
#   Frontend (vitrine):   http://localhost:5173
#   API/Backend:          http://localhost:8000/api/
#   Django Admin:         http://localhost:8000/admin/

services:
  db:
    image: postgres:16-alpine
    container_name: atelie_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-atelie}
      POSTGRES_USER: ${DB_USER:-atelie}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-atelie}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - atelie_pgdata:/var/lib/postgresql/data
      # Cria o banco "evolution" (usado pela Evolution API) no PRIMEIRO init do volume.
      # Atenção: scripts em initdb.d só rodam quando o volume está vazio. Se o pgdata
      # já existe, crie o banco manualmente (veja o README, seção "Bot de WhatsApp").
      - ./docker/db-init/01-evolution-db.sh:/docker-entrypoint-initdb.d/01-evolution-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-atelie} -d ${DB_NAME:-atelie}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atelie_backend
    restart: unless-stopped
    # Carrega as variáveis do .env e sobrescreve o necessário para rodar em container.
    env_file: .env
    environment:
      # Dentro da rede do compose o banco é o serviço "db", não "localhost".
      DB_HOST: db
      DB_PORT: 5432
      # A Evolution chama o Django por http://backend:8000; sem "backend" aqui
      # o Django responde 400 DisallowedHost antes de chegar no webhook.
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1},backend
      # Superuser criado automaticamente no primeiro start (troque a senha!).
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@atelie.local}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-Atelie@2026}
    volumes:
      - .:/app                 # hot reload do código
      - atelie_media:/app/media # uploads persistidos
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: atelie_frontend
    restart: unless-stopped
    environment:
      # O navegador acessa a API pela porta publicada no host.
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_WHATSAPP: ${VITE_WHATSAPP:-5581990000000}
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app        # hot reload do código
      - /app/node_modules      # mantém o node_modules do container (Linux)
    ports:
      - "5173:5173"
    depends_on:
      - backend

  # --------------------------------------------------------------------------
  # Bot de WhatsApp do DONO (privado, controle de estoque) — NÃO sobe sozinho.
  # Suba sob demanda:  docker compose up redis evolution-api
  # Use um número de telefone DEDICADO (nunca o número principal da loja —
  # risco de banimento na API não-oficial).
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: atelie_redis
    restart: unless-stopped
    volumes:
      - atelie_redis:/data
    # Não publica porta no host: só serviços da rede do compose usam o cache.

  # Serviço one-shot: garante o banco "evolution" no Postgres ANTES da Evolution
  # subir. Roda a cada `up` (não depende do init do volume), então funciona mesmo
  # quando o pgdata já existia. Sai com código 0 após criar/confirmar o banco.
  evolution-db-init:
    image: postgres:16-alpine
    container_name: atelie_evolution_db_init
    restart: "no"
    environment:
      DB_USER: ${DB_USER:-atelie}
      DB_PASSWORD: ${DB_PASSWORD:-atelie}
    entrypoint: ["sh", "/ensure-evolution-db.sh"]
    volumes:
      - ./docker/ensure-evolution-db.sh:/ensure-evolution-db.sh:ro
    depends_on:
      db:
        condition: service_healthy

  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: atelie_evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # URL pública da própria Evolution (usada por ela em links de QR/integrações).
      SERVER_URL: ${EVOLUTION_URL:-http://localhost:8080}
      # Chave global da API — todo request precisa do header "apikey".
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}

      # Versão do WhatsApp Web usada pelo Baileys. Quando o WhatsApp invalida a
      # versão embutida, o handshake dá timeout (408 "validating connection"),
      # a instância entra em loop e o QR NUNCA é emitido. Fixe aqui uma versão
      # atual (formato 2.3000.xxxxxxxxxx) para destravar. Veja o README.
      CONFIG_SESSION_PHONE_VERSION: ${EVOLUTION_WA_VERSION:-2.3000.1035194821}

      # Banco: reaproveita o Postgres "db", porém num banco PRÓPRIO chamado "evolution".
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${DB_USER:-atelie}:${DB_PASSWORD:-atelie}@db:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: atelie_evolution

      # Cache em Redis (recomendado pela Evolution v2); cache local desligado.
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/0
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_LOCAL_ENABLED: "false"

      # Webhook global: entrega os eventos habilitados ao backend Django.
      # Dentro da rede do compose o backend é "backend:8000".
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: ${EVOLUTION_WEBHOOK_URL:-http://backend:8000/api/webhooks/whatsapp/}
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      # A Evolution v2 filtra eventos por flags; sem isto mensagens recebidas
      # aparecem nos logs da Evolution, mas não chegam ao webhook do Django.
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
    volumes:
      # Sessão/instâncias do WhatsApp (Baileys) persistidas entre reinícios.
      - atelie_evolution:/evolution/instances
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      # Só sobe depois que o banco "evolution" estiver garantido.
      evolution-db-init:
        condition: service_completed_successfully

volumes:
  atelie_pgdata:
  atelie_media:
  atelie_redis:
  atelie_evolution:
